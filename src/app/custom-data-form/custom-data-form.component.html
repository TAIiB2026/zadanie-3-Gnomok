<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <label>
    Value (0-1000):
    <input type="number" formControlName="value" />
    <span *ngIf="form.get('value')?.invalid && form.get('value')?.touched">
      <span *ngIf="form.get('value')?.errors?.['required']">Value is required</span>
      <span *ngIf="form.get('value')?.errors?.['numericRange']">Value must be between 0 and 1000</span>
    </span>
  </label>
  <br />

  <label>
    Date (must be past date):
    <input type="date" formControlName="date" />
    <span *ngIf="form.get('date')?.invalid && form.get('date')?.touched">
      <span *ngIf="form.get('date')?.errors?.['required']">Date is required</span>
      <span *ngIf="form.get('date')?.errors?.['invalidDate']">Invalid date</span>
      <span *ngIf="form.get('date')?.errors?.['futureDate']">Date cannot be in the future</span>
    </span>
  </label>
  <br />

  <label>
    Description (5-200 characters):
    <textarea formControlName="description"></textarea>
    <span *ngIf="form.get('description')?.invalid && form.get('description')?.touched">
      <span *ngIf="form.get('description')?.errors?.['required']">Description is required</span>
      <span *ngIf="form.get('description')?.errors?.['textLength']">Description must be between 5 and 200 characters</span>
    </span>
  </label>
  <br />

  <button type="submit" [disabled]="form.invalid">Zapisz</button>
</form>
